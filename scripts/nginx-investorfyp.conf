# InvestorFYP – nginx location block
# Add this INSIDE your existing server { } block in /etc/nginx/sites-available/default
# (or wherever your model is configured)
#
# This adds /web and /api routes WITHOUT touching your existing / route.
#
# Drop this file at: /etc/nginx/snippets/investorfyp.conf
# Then in your server block add:   include snippets/investorfyp.conf;

# ── React SPA served from /web ────────────────────────────────────────────────
location /web {
    alias /var/www/investorfyp/frontend/dist;
    try_files $uri $uri/ /web/index.html;

    # HTML entry point: NEVER cache — ensures each new deploy shows fresh bundle
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;

    # Static assets (content-hashed filenames): cache aggressively
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Django REST API at /api ───────────────────────────────────────────────────
location /api {
    proxy_pass         http://127.0.0.1:8765;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

# ── Django admin (optional) ───────────────────────────────────────────────────
location /django-admin {
    proxy_pass         http://127.0.0.1:8765;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

# ── Django static files ───────────────────────────────────────────────────────
location /static-django {
    alias /var/www/investorfyp/backend/staticfiles;
    expires 1y;
    add_header Cache-Control "public";
}
